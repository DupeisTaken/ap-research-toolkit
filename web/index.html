<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f6feb">
  <title>AP Research Toolkit</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/icon.svg" alt="" class="brand-icon" width="24" height="24">
      <span>AP Research Toolkit</span>
    </div>
    <div class="topbar-controls">
      <select id="project-select" aria-label="Project"></select>
      <button id="project-menu-btn" class="icon-btn" title="Project actions" aria-label="Project actions">&#8942;</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="sources">Sources</button>
    <button class="tab" data-tab="timeline">Timeline</button>
    <button class="tab" data-tab="sections">Sections</button>
  </nav>

  <main id="view"></main>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
